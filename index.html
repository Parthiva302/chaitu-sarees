<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaitu Sarees - Sales Dashboard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/sales.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-body-custom">
    
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-store fa-2x logo-icon"></i>
            <h3 class="brand-text">Chaitu Sarees</h3>
        </div>
        <ul class="nav-links">
            <li><a href="#" data-page="dashboard" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="#" data-page="sales"><i class="fa-solid fa-cart-plus"></i> New Sale</a></li>
            <li><a href="#" data-page="records"><i class="fa-solid fa-table-list"></i> Sales Records</a></li>
            <li><a href="#" data-page="reports"><i class="fa-solid fa-chart-line"></i> Reports</a></li>
            <li><a href="#" data-page="payments"><i class="fa-solid fa-wallet"></i> Payments</a></li>
            <li><a href="#" data-page="settings"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content-wrapper">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="nav-left">
                <button id="sidebarToggle" class="btn btn-outline-primary me-3 d-md-none"><i class="fa-solid fa-bars"></i></button>
                <div class="date-time-container">
                    <span id="current-date" class="current-date"></span>
                    <span id="live-clock" class="live-clock badge bg-primary-custom ms-2"></span>
                </div>
            </div>
            <div class="nav-right">
                <button class="btn btn-accent px-4 py-2 text-white fw-bold shadow-sm" onclick="app.navigate('sales')">
                    <i class="fa-solid fa-plus me-1"></i> New Sale
                </button>
            </div>
        </header>

        <!-- Dynamic Page Content -->
        <div id="page-container" class="page-container p-4">
            <!-- Content loaded via JS -->
        </div>
    </main>

    <!-- Toast Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message">
                    Sale Saved Successfully!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Hidden Print Container -->
    <div id="print-container" class="d-none"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- App Scripts -->
    <script src="js/utils.js?v=3"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/dashboard.js?v=3"></script>
    <script src="js/sales.js?v=3"></script>
    <script src="js/records.js?v=3"></script>
    <script src="js/report.js?v=3"></script>
    <script src="js/payment.js?v=3"></script>
    <script src="js/settings.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
