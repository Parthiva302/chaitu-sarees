<!-- pages/payments.html -->
<div class="container-fluid p-0 max-w-800 mx-auto">
    <h2 class="fw-bold text-primary-custom mb-4"><i class="fa-solid fa-wallet me-2"></i> Payment Breakdown</h2>

    <!-- Summary Cards -->
    <div class="row g-3 mb-4">
        <div class="col-12 col-md-4">
            <div class="glass-card p-3 text-center border-top border-4 border-success">
                <h6 class="text-muted mb-1">Total Collected</h6>
                <h3 class="fw-bold text-success mb-0" id="pay-grand-total">₹0</h3>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="glass-card p-3 text-center border-top border-4 border-danger">
                <h6 class="text-muted mb-1">Pending Amount</h6>
                <h3 class="fw-bold text-danger mb-0" id="pay-pending">₹0</h3>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="glass-card p-3 text-center border-top border-4 border-primary">
                <h6 class="text-muted mb-1">Total Bills</h6>
                <h3 class="fw-bold text-primary-custom mb-0" id="pay-total-bills">0</h3>
                <small class="text-muted"><span id="pay-paid-bills">0</span> paid · <span id="pay-pending-bills">0</span> pending</small>
            </div>
        </div>
    </div>

    <!-- Breakdown List -->
    <div class="glass-card p-4">
        <h5 class="fw-bold mb-4 text-muted">Collections by Payment Method</h5>
        <div class="list-group list-group-flush mb-4" id="paymentBreakdownList">
            <!-- Dynamic Content -->
            <div class="text-center py-5 text-muted">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Loading...</p>
            </div>
        </div>
    </div>
</div>
