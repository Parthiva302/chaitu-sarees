<!-- pages/records.html -->
<div class="container-fluid p-0">
    <h2 class="fw-bold text-primary-custom mb-4"><i class="fa-solid fa-table-list me-2"></i> Sales Records</h2>

    <div class="glass-card p-4">
        <!-- Filters -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <input type="text" class="form-control" id="searchCustomer" placeholder="Search Customer...">
            </div>
            <div class="col-md-3">
                <input type="text" class="form-control" id="searchInvoice" placeholder="Search Invoice...">
            </div>
            <div class="col-md-3">
                <select class="form-select" id="filterDate">
                    <option value="All">All Time</option>
                    <option value="Today" selected>Today</option>
                    <option value="Yesterday">Yesterday</option>
                    <option value="Custom">Custom Date</option>
                </select>
            </div>
            <div class="col-md-3 d-none" id="customDateContainer">
                <input type="date" class="form-control" id="customDate">
            </div>
        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="recordsTable">
                <thead class="table-light">
                    <tr>
                        <th>Invoice</th>
                        <th>Date & Time</th>
                        <th>Customer</th>
                        <th>Sarees</th>
                        <th>Amount</th>
                        <th>Payment</th>
                        <th>Status</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="recordsTbody">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- View Record Modal -->
<div class="modal fade" id="viewRecordModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary-custom text-white">
                <h5 class="modal-title">Sale Details</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="recordDetailsBody">
                <!-- details -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Update Payment Modal -->
<div class="modal fade" id="updatePaymentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary-custom text-white">
                <h5 class="modal-title">Update Payment</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <p class="mb-1 text-muted small">Invoice</p>
                    <h6 class="fw-bold" id="paymentModalInvoice"></h6>
                </div>
                <div class="mb-3">
                    <p class="mb-1 text-muted small">Customer</p>
                    <h6 class="fw-bold" id="paymentModalCustomer"></h6>
                </div>
                <div class="mb-3">
                    <p class="mb-1 text-muted small">Amount</p>
                    <h6 class="fw-bold text-danger" id="paymentModalAmount"></h6>
                </div>
                <div class="mb-3">
                    <p class="mb-1 text-muted small">Current Status</p>
                    <h6><span class="badge bg-danger" id="paymentModalStatus">Pending</span></h6>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Payment Method <span class="text-danger">*</span></label>
                    <select class="form-select" id="paymentModalMethod">
                        <option value="Cash">Cash</option>
                        <option value="PhonePe">PhonePe</option>
                        <option value="Google Pay">Google Pay</option>
                        <option value="UPI">UPI</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary-custom" onclick="confirmPayment()">Confirm Payment</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteConfirmModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title"><i class="fa-solid fa-triangle-exclamation me-2"></i>Delete Sale</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="fa-solid fa-trash text-danger fa-3x mb-3"></i>
                <h5 class="fw-bold">Are you sure you want to delete this sale?</h5>
                <p class="text-muted" id="deleteModalInvoiceText"></p>
                <p class="text-danger small mb-0">This action cannot be undone.</p>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger px-4" onclick="confirmDeleteSale()">Delete</button>
            </div>
        </div>
    </div>
</div>
